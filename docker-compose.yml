services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: capstonehub
      POSTGRES_USER: capstone
      POSTGRES_PASSWORD: capstone
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U capstone -d capstonehub"]
      interval: 5s
      timeout: 5s
      retries: 10

  ai-service:
    build: ./ai-service
    environment:
      PORT: 8000
      DATABASE_URL: postgres://capstone:capstone@postgres:5432/capstonehub
      EMBEDDING_MODEL: hashing-vectorizer-768
      RERANKER_MODEL: ""
      LLM_PROVIDER: ${LLM_PROVIDER:-disabled}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=3)"]
      interval: 10s
      timeout: 5s
      retries: 3
    depends_on:
      postgres:
        condition: service_healthy

  backend:
    build: ./backend
    environment:
      NODE_ENV: development
      PORT: 4000
      DATABASE_URL: postgres://capstone:capstone@postgres:5432/capstonehub
      JWT_SECRET: ${JWT_SECRET:-local-demo-jwt-secret-change-before-production}
      AI_SERVICE_URL: http://ai-service:8000
      UPLOAD_DIR: uploads
      CORS_ORIGIN: http://frontend:5173,http://localhost:5173,http://127.0.0.1:5173
    ports:
      - "4000:4000"
    volumes:
      - ./backend/uploads:/app/uploads
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:4000/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 3
    depends_on:
      postgres:
        condition: service_healthy
      ai-service:
        condition: service_healthy

  frontend:
    build: ./frontend
    environment:
      VITE_API_URL: http://localhost:4000/api
    ports:
      - "5173:5173"
    depends_on:
      - backend
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:5173').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 3

volumes:
  postgres_data:
